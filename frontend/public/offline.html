<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexion — LeisModa</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #FAF7F2; color: #1A1612;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .card { text-align: center; max-width: 400px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.3; color: #8A7968; }
    h1 { font-family: serif; font-size: 1.5rem; margin-bottom: 0.75rem; color: #1A1612; }
    p { color: #8A7968; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; padding: 0.75rem 2rem; border-radius: 999px;
      background: #C9A96E; color: #1A1612; font-weight: 600;
      text-decoration: none; font-size: 0.9rem;
    }
    .btn:hover { background: #b8944f; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <h1>Sin conexion</h1>
    <p>Parece que no tienes internet. Verifica tu conexion e intenta de nuevo.</p>
    <a href="/" class="btn">Intentar de nuevo</a>
  </div>
</body>
</html>
